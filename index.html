<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KiJi - RSS Reader</title>
    <script>
      (() => {
        const root = document.documentElement;
        let themeMode = "auto";

        try {
          const settingsJson = localStorage.getItem("user-settings");
          if (settingsJson) {
            const settings = JSON.parse(settingsJson);
            if (settings && typeof settings.theme === "string") {
              themeMode = settings.theme;
            }
          }
        } catch (error) {
          console.error("Error reading startup theme settings:", error);
        }

        const systemPrefersDark =
          typeof window.matchMedia === "function" &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        const resolvedTheme =
          themeMode === "dark" ? "dark" : themeMode === "light" ? "light" : systemPrefersDark ? "dark" : "light";

        root.setAttribute("data-theme", resolvedTheme);
        root.style.colorScheme = resolvedTheme;

        // Platform chrome: macOS uses native sidebar vibrancy; Windows/Linux need CSS glass.
        const ua = navigator.userAgent.toLowerCase();
        const platform = navigator.platform ? navigator.platform.toLowerCase() : "";
        const os =
          ua.includes("mac") || platform.includes("mac")
            ? "macos"
            : ua.includes("win") || platform.includes("win")
              ? "windows"
              : ua.includes("linux") || platform.includes("linux")
                ? "linux"
                : "other";
        root.setAttribute("data-os", os);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/renderer.tsx"></script>
  </body>
</html>
