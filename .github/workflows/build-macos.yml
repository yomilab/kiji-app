name: Build Tauri macOS

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: tauri-macos-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-macos:
    name: Build macOS app
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Log toolchain versions
        run: |
          sw_vers
          xcode-select -p
          xcodebuild -version
          node --version
          npm --version
          rustc --version
          cargo --version

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run frontend tests
        run: npm test

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Run desktop smoke tests
        run: npm run test:smoke

      - name: Build Tauri app
        run: npm run build

      - name: Desktop launch smoke
        run: npm run test:smoke:launch

      - name: Upload macOS bundles
        uses: actions/upload-artifact@v6
        with:
          name: kiji-app-macos
          path: src-tauri/target/release/bundle/**/*
          if-no-files-found: error
