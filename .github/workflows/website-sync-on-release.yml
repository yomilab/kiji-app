name: Sync website on release

# Manual / UI-published releases still use this workflow.
# Tag builds create the GitHub Release with GITHUB_TOKEN, which does NOT fire
# `release: published` — those runs sync the website from publish-github-release
# in build-desktop.yml instead.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to sync (e.g. v1.0.2)
        required: true
        type: string

permissions:
  contents: write

jobs:
  sync-website:
    if: ${{ github.event_name == 'workflow_dispatch' || (!github.event.release.draft && !github.event.release.prerelease) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release.json from GitHub Release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          node scripts/generate-release-manifest.mjs \
            --tag "${{ steps.tag.outputs.name }}" \
            --output release.json

      - name: Attach release.json to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "${{ steps.tag.outputs.name }}" release.json --clobber

      - name: Dispatch kiji-website release sync
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
          TAG_NAME: ${{ steps.tag.outputs.name }}
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "WEBSITE_DISPATCH_TOKEN is not configured; skipping website metadata sync."
            exit 0
          fi
          MANIFEST_URL="https://github.com/yomilab/kiji-app/releases/download/${TAG_NAME}/release.json"
          gh api repos/yomilab/kiji-website/dispatches \
            --method POST \
            -f event_type=kiji-release-published \
            -f "client_payload[tag]=${TAG_NAME}" \
            -f "client_payload[release_manifest_url]=${MANIFEST_URL}"
