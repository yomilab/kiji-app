name: Build Tauri desktop

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile to package
        required: true
        default: release
        type: choice
        options:
          - release
          - debug
          - both
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

concurrency:
  group: tauri-desktop-${{ github.ref }}-${{ github.event.inputs.profile || 'release' }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify (${{ matrix.platform_id }})
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_id: ubuntu
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils \
            libfuse2

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run frontend tests
        env:
          KIJI_SKIP_E2E: "1"
        run: npm run test:ci

      - name: Run parity tests
        run: npm run test:parity

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Run desktop smoke tests
        run: npm run test:smoke

  build:
    name: Build ${{ matrix.profile }} (${{ matrix.platform_id }})
    needs: verify
    if: github.event_name == 'push' || github.event.inputs.profile != 'debug'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform_id: macos-aarch64
            rust_target: aarch64-apple-darwin
            profile: release
            bundle_args: ""
            launch_binary: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/KiJi.app/Contents/MacOS/kiji-app
            launch_use_xvfb: "false"
          - os: macos-14
            platform_id: macos-x86_64
            rust_target: x86_64-apple-darwin
            profile: release
            bundle_args: ""
            launch_binary: src-tauri/target/x86_64-apple-darwin/release/bundle/macos/KiJi.app/Contents/MacOS/kiji-app
            launch_use_xvfb: "false"
          - os: windows-latest
            platform_id: windows-x86_64
            rust_target: x86_64-pc-windows-msvc
            profile: release
            bundle_args: ""
            launch_binary: src-tauri/target/x86_64-pc-windows-msvc/release/kiji-app.exe
            launch_use_xvfb: "false"
          - os: windows-latest
            platform_id: windows-aarch64
            rust_target: aarch64-pc-windows-msvc
            profile: release
            bundle_args: ""
            launch_binary: src-tauri/target/aarch64-pc-windows-msvc/release/kiji-app.exe
            launch_use_xvfb: "false"
          - os: ubuntu-24.04
            platform_id: linux-x86_64
            rust_target: x86_64-unknown-linux-gnu
            profile: release
            bundle_args: ""
            launch_binary: src-tauri/target/x86_64-unknown-linux-gnu/release/kiji-app
            launch_use_xvfb: "true"
          - os: ubuntu-24.04-arm
            platform_id: linux-aarch64
            rust_target: aarch64-unknown-linux-gnu
            profile: release
            bundle_args: ""
            launch_binary: src-tauri/target/aarch64-unknown-linux-gnu/release/kiji-app
            launch_use_xvfb: "true"

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux build dependencies
        if: startsWith(matrix.platform_id, 'linux-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils \
            libfuse2 \
            xvfb

      - name: Log toolchain versions
        shell: bash
        run: |
          node --version
          npm --version
          rustc --version
          cargo --version
          rustc --print host-tuple
          rustc --print target-list | grep "${{ matrix.rust_target }}" || true

      - name: Install dependencies
        run: npm ci

      - name: Import Apple Developer certificate
        if: matrix.profile == 'release' && startsWith(matrix.platform_id, 'macos-')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_CERTIFICATE:-}" ]]; then
            echo "APPLE_CERTIFICATE secret is empty or not set."
            exit 1
          fi
          printf '%s' "$APPLE_CERTIFICATE" | tr -d '[:space:]' | openssl base64 -A -d -out "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import "$RUNNER_TEMP/certificate.p12" -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Setup notarization API key
        if: matrix.profile == 'release' && startsWith(matrix.platform_id, 'macos-')
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/private_keys"
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY}.p8"
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY}.p8" >> "$GITHUB_ENV"

      - name: Build Tauri bundles
        env:
          CI: true
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        shell: bash
        run: |
          set -euo pipefail
          PROFILE="${{ matrix.profile }}"
          TARGET="${{ matrix.rust_target }}"
          ARGS=(--target "$TARGET")

          if [[ "$PROFILE" == "debug" ]]; then
            ARGS+=(--debug)
          fi

          if [[ -n "${{ matrix.bundle_args }}" ]]; then
            # shellcheck disable=SC2206
            EXTRA=(${{ matrix.bundle_args }})
            ARGS+=("${EXTRA[@]}")
          fi

          npx tauri build "${ARGS[@]}"

      - name: Verify macOS bundle signature
        if: startsWith(matrix.platform_id, 'macos-') && matrix.profile == 'release'
        run: |
          set -euo pipefail
          APP="src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos/KiJi.app"
          codesign --verify --deep --strict --verbose=2 "$APP"
          codesign --display --verbose=2 "$APP" 2>&1 | tee /tmp/codesign-info.txt
          grep -q "Developer ID Application" /tmp/codesign-info.txt
          xcrun stapler validate "$APP"

      - name: Desktop launch smoke
        if: matrix.profile == 'release'
        shell: bash
        env:
          KIJI_APP_BINARY: ${{ matrix.launch_binary }}
          KIJI_PLATFORM_ID: ${{ matrix.platform_id }}
          KIJI_RUST_TARGET: ${{ matrix.rust_target }}
        run: |
          set -euo pipefail
          if [[ "${{ matrix.launch_use_xvfb }}" == "true" ]]; then
            xvfb-run -a npm run test:smoke:launch
          else
            npm run test:smoke:launch
          fi

      - name: Collect bundle artifacts
        shell: bash
        run: |
          node scripts/collect-bundle-artifacts.mjs \
            --profile "${{ matrix.profile }}" \
            --platform "${{ matrix.platform_id }}" \
            --target "${{ matrix.rust_target }}"

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v6
        with:
          name: kiji-${{ matrix.platform_id }}-${{ matrix.profile }}
          path: src-tauri/target/${{ matrix.rust_target }}/${{ matrix.profile }}/bundle/artifacts/${{ matrix.platform_id }}/${{ matrix.profile }}/*
          if-no-files-found: error

  e2e-macos:
    name: E2E macOS (debug)
    needs: verify
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build debug bundle for E2E
        env:
          CI: true
          VITE_KIJI_E2E: "1"
          VITE_KIJI_E2E_SCHEDULER_INTERVAL_MS: "500"
        run: npm run build:debug

      - name: Run macOS real-app E2E
        env:
          CI: true
          KIJI_RUN_E2E_IN_CI: "1"
          KIJI_E2E_REQUIRED: "1"
          KIJI_E2E_HIDE_UI: "0"
        run: npm run test:e2e

  build-debug-linux:
    name: Build debug (linux-x86_64)
    needs: verify
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.profile == 'debug' || github.event.inputs.profile == 'both')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils \
            libfuse2

      - name: Install dependencies
        run: npm ci

      - name: Build debug bundles
        env:
          CI: true
        run: npm run build:debug

      - name: Collect debug artifacts
        run: |
          node scripts/collect-bundle-artifacts.mjs \
            --profile debug \
            --platform linux-x86_64

      - name: Upload debug Linux artifacts
        uses: actions/upload-artifact@v6
        with:
          name: kiji-linux-x86_64-debug
          path: src-tauri/target/debug/bundle/artifacts/linux-x86_64/debug/*
          if-no-files-found: error
