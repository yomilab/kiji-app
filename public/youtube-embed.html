<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>YouTube</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
      }

      iframe {
        border: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const videoId = params.get('v');
        if (!videoId || !/^[A-Za-z0-9_-]{6,}$/.test(videoId)) {
          return;
        }

        const embedParams = new URLSearchParams();
        embedParams.set('autoplay', params.get('autoplay') || '1');
        embedParams.set('playsinline', '1');
        embedParams.set('rel', '0');

        const start = params.get('start');
        if (start) {
          embedParams.set('start', start);
        }

        const iframe = document.createElement('iframe');
        iframe.src = `https://www.youtube-nocookie.com/embed/${encodeURIComponent(videoId)}?${embedParams.toString()}`;
        iframe.title = 'YouTube video';
        iframe.allow = 'accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture; fullscreen';
        iframe.allowFullscreen = true;
        iframe.referrerPolicy = 'strict-origin-when-cross-origin';
        document.body.appendChild(iframe);
      })();
    </script>
  </body>
</html>
